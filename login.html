<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="login.html">Alke Wallet</a>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container mt-4" style="max-width:400px;">
    <h1 class="text-center">Iniciar Sesión</h1>
    <form id="loginForm" class="mt-3">
      <div class="mb-3">
        <label for="username">Usuario</label>
        <input type="text" id="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="password">Contraseña</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Ingresar</button>
    </form>

    <p id="loginMessage" class="mt-2 text-center"></p>

    <!-- Botón para abrir registro -->
    <div class="text-center mt-3">
      <button id="showRegister" class="btn btn-success w-100">Registrarse</button>
    </div>

    <!-- Formulario de registro oculto -->
    <form id="registerForm" class="mt-3 d-none">
      <h2 class="text-center">Registro</h2>
      <div class="mb-3">
        <label for="newUsername">Nuevo Usuario</label>
        <input type="text" id="newUsername" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="newPassword">Nueva Contraseña</label>
        <input type="password" id="newPassword" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-success w-100">Crear Cuenta</button>
      <button type="button" id="cancelRegister" class="btn btn-secondary w-100 mt-2">Cancelar</button>
    </form>

    <!-- Botón de modo oscuro -->
    <button id="darkModeToggle" class="btn btn-dark w-100 mt-3">🌙 Modo Oscuro</button>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
