<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Alke Wallet - Transacciones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="menu.html">Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link" href="deposit.html">Depositar</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar Dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Cerrar Sesión</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container mt-4" style="max-width:900px;">
    <h2 class="text-center">Historial de Transacciones</h2>
    <p class="text-center mt-3">Saldo actual: <span id="saldo"></span></p>

    <!-- Tabla de transacciones -->
    <table id="transactionTable" class="table table-striped table-bordered mt-3">
      <thead class="table-dark">
        <tr>
          <th>Fecha</th>
          <th>N° de Operación</th>
          <th>Descripción</th>
          <th>Abonos</th>
          <th>Cargos</th>
          <th>Saldos</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- Botón de modo oscuro pequeño -->
    <div class="text-center mt-3">
      <button id="darkModeToggle" class="btn btn-dark btn-sm">🌙 Modo Oscuro</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/transactions.js"></script>
</body>
</html>
