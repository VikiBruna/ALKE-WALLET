<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Transacciones</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Barra de navegación arriba -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="menu.html">Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link" href="deposit.html">Depositar</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar Dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Cerrar Sesión</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container mt-4">
    <h2 class="text-center">Historial de Transacciones</h2>
    <table class="table table-striped mt-4">
      <thead class="table-dark">
        <tr>
          <th>Tipo</th>
          <th>Destinatario</th>
          <th>Monto</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="transactionsTable"></tbody>
    </table>
    <p id="noTransactions" class="text-center text-muted"></p>

    <!-- Botón de modo oscuro -->
    <div class="text-center mt-4">
      <button id="darkModeToggle" class="btn btn-dark">🌙 Modo Oscuro</button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Script personalizado -->
  <script src="js/transactions.js"></script>
</body>
</html>
