<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Depósitos</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Barra de navegación arriba -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="menu.html">Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar Dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Transacciones</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Cerrar Sesión</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container mt-4" style="max-width:400px;">
    <h2 class="text-center">Realizar Depósito</h2>
    <form id="depositForm" class="mt-3">
      <div class="mb-3">
        <label for="destinatario">Destinatario</label>
        <input type="text" id="destinatario" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="monto">Monto</label>
        <input type="number" id="monto" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-success w-100">Depositar</button>
    </form>

    <p class="text-center mt-3">Saldo actual: <span id="saldo"></span></p>

    <!-- Lista de contactos -->
    <h5 class="mt-4">Contactos</h5>
    <ul id="contactList" class="list-group"></ul>
    <button id="addContactBtn" class="btn btn-primary w-100 mt-3">Agregar Contacto</button>

    <!-- Botón de modo oscuro -->
    <button id="darkModeToggle" class="btn btn-dark w-100 mt-3">🌙 Modo Oscuro</button>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/deposit.js"></script>
</body>
</html>
