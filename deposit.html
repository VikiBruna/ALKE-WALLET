<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Alke Wallet - Depósito</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="menu.html">Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar Dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Transacciones</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Cerrar Sesión</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container mt-4 d-flex justify-content-center">
    <div class="card shadow p-4 text-center" style="max-width:400px; width:100%;">
      <h2 class="mb-3">Depósito</h2>
      <p>Usuario: <span id="usuarioNombre"></span></p>
      <p>Saldo actual: <span id="saldo"></span></p>

      <!-- Formulario de depósito -->
      <form id="depositForm" class="mt-3">
        <div class="mb-3">
          <label for="monto" class="form-label">Monto a depositar</label>
          <input type="number" id="monto" class="form-control text-center" placeholder="Ingrese monto">
        </div>
        <button type="submit" class="btn btn-primary w-100">Depositar</button>
      </form>

      <!-- Botón de modo oscuro -->
      <button id="darkModeToggle" class="btn btn-dark w-100 mt-3">🌙 Modo Oscuro</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="js/deposit.js"></script>
</body>
</html>
